[manager]
keymap = [
  # Navigation
  { on = "k", run = "arrow -1", desc = "Move up" },
  { on = "j", run = "arrow 1",  desc = "Move down" },
  { on = "h", run = "leave",    desc = "Go to parent directory" },
  { on = "l", run = "enter",    desc = "Enter directory / open file" },

  { on = "g g", run = "arrow -99999999", desc = "Go to top" },
  { on = "G",   run = "arrow 99999999",  desc = "Go to bottom" },

  { on = "<Up>",    run = "arrow -1", desc = "Move up" },
  { on = "<Down>",  run = "arrow 1",  desc = "Move down" },
  { on = "<Left>",  run = "leave",    desc = "Go to parent directory" },
  { on = "<Right>", run = "enter",    desc = "Enter directory / open file" },

  # Selection
  { on = "<Space>", run = "select --state=none", desc = "Toggle selection" },
  { on = "v",       run = "visual_mode",          desc = "Enter visual mode" },
  { on = "V",       run = "select_all --state=none", desc = "Toggle all selections" },

  # File operations
  { on = "y", run = "yank",           desc = "Yank selected files" },
  { on = "x", run = "yank --cut",     desc = "Cut selected files" },
  { on = "p", run = "paste",          desc = "Paste files" },
  { on = "P", run = "paste --force",  desc = "Paste files (overwrite)" },
  { on = "d", run = "remove",         desc = "Move files to trash" },
  { on = "D", run = "remove --permanently", desc = "Permanently delete files" },
  { on = "a", run = "create",         desc = "Create file or directory" },
  { on = "r", run = "rename --cursor=before_ext", desc = "Rename file" },

  # Search
  { on = "f", run = "search --via=fd",  desc = "Search files via fd" },
  { on = "/", run = "find",             desc = "Find next file" },
  { on = "n", run = "find_arrow",       desc = "Go to next found file" },
  { on = "N", run = "find_arrow --previous", desc = "Go to previous found file" },

  # Show/hide hidden files
  { on = ".", run = "hidden toggle", desc = "Toggle hidden files" },

  # Sorting
  { on = "s n", run = "sort natural   --dir-first", desc = "Sort by natural" },
  { on = "s m", run = "sort modified  --dir-first", desc = "Sort by modified time" },
  { on = "s s", run = "sort size      --dir-first", desc = "Sort by size" },
  { on = "s e", run = "sort extension --dir-first", desc = "Sort by extension" },

  # Tabs
  { on = "t",       run = "tab_create --current", desc = "Create a new tab" },
  { on = "<Tab>",   run = "tab_switch 1  --relative", desc = "Switch to next tab" },
  { on = "<S-Tab>", run = "tab_switch -1 --relative", desc = "Switch to previous tab" },

  # Misc
  { on = "q", run = "quit",    desc = "Quit" },
  { on = "?", run = "help",    desc = "Open help" },
  { on = "~", run = "cd ~",    desc = "Go home" },
  { on = "e", run = "open --interactive", desc = "Open file with program" },
  { on = "z", run = "plugin zoxide", desc = "Jump via zoxide" },
]
