# ============================================================================
# TERMINAL & COLORS
# ============================================================================
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm*:Tc"

# Better Alt key support
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# ============================================================================
# GENERAL SETTINGS
# ============================================================================
set -g mouse on
set -sg escape-time 0
set -g status-interval 10
set -g mode-keys vi
# automatic-rename-format removed: tmux-nerd-font-window-name manages names directly

# ============================================================================
# KEY BINDINGS - PREFIX
# ============================================================================
set -g prefix C-x
unbind C-b
bind C-x send-prefix

# ============================================================================
# KEY BINDINGS - PANE NAVIGATION (VIM STYLE)
# ============================================================================
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ============================================================================
# KEY BINDINGS - PANE RESIZING
# ============================================================================
bind -n M-Up resize-pane -U 5
bind -n M-Down resize-pane -D 5
bind -n M-Left resize-pane -L 5
bind -n M-Right resize-pane -R 5

# ============================================================================
# KEY BINDINGS - WINDOW SWITCHING
# ============================================================================
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9

# ============================================================================
# KEY BINDINGS - SPLITS (MAINTAIN CURRENT PATH)
# ============================================================================
bind '%' split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# ============================================================================
# KEY BINDINGS - POPUPS
# ============================================================================
# Floating scratch window (Alt + g)
bind-key -n M-g if-shell -F '#{==:#{session_name},scratch}' \
  "detach-client" \
  "display-popup -E 'tmux new-session -A -s scratch'"

# Ranger file manager (Alt + r) — was C-r, conflicted with shell reverse-history-search
bind -n M-r display-popup \
  -d "#{pane_current_path}" \
  -w 90% \
  -h 90% \
  -E "ranger"

# Terminal popup (Alt + t) — was C-t, conflicted with shell transpose-chars
bind -n M-t display-popup \
  -d "#{pane_current_path}" \
  -w 75% \
  -h 75% \
  -E "$SHELL"

# Tmux sessionizer (prefix + f)
bind-key f run-shell "tmux neww ~/.config/tmux/scripts/tmux-sessionizer"

# ============================================================================
# KEY BINDINGS - COPY MODE
# ============================================================================
set -s set-clipboard external

if-shell 'uname | grep -q Darwin' {
  bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
  bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
  bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
} {
  bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
  bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
  bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
}

# ============================================================================
# PANE BORDERS
# ============================================================================
# pane-border-style and pane-active-border-style removed — catppuccin overwrites
# them after run; configure via @catppuccin_pane_border_style instead
set -g pane-border-lines heavy
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=#7E9CD8 bold] ● #[fg=#C8C093]#{pane_current_command} ,#[fg=#2D3149] ○ #[fg=#727169]#{pane_current_command} }"

# ============================================================================
# THEME - CATPPUCCIN
# ============================================================================
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"

# Run catppuccin manually (not via TPM) so status-right config below takes effect
run ~/.tmux/plugins/tmux/catppuccin.tmux

# ============================================================================
# STATUS BAR
# ============================================================================
set -g status-position top
set -g status-left ""
set -g @catppuccin_pane_default_text "##{b:pane_current_path}"
set -g @catppuccin_pane_active_border_style "##{?pane_in_mode,fg=#{@thm_lavender},##{?pane_synchronized,fg=#{@thm_mauve},fg=#{@thm_lavender}}}"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

set -g status-right-length 400
set -g status-right ""
set -agF status-right "#{E:@catppuccin_status_date_time}"

# ============================================================================
# PLUGINS - CORE
# ============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# ============================================================================
# PLUGINS - UTILITIES
# ============================================================================
set -g @fuzzback-bind '/'
set -g @fuzzback-hide-preview 1
set -g @plugin 'roosta/tmux-fuzzback'

set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-bind 'o'

# tmux-mem-cpu-load removed — not referenced in status bar, was running for nothing

set -g @plugin 'jaclu/tmux-menus'
set -g @menus_trigger 'b'


set -g @plugin 'rickstaa/tmux-notify'

set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'

set -g @plugin 'AngryMorrocoy/tmux-neolazygit'
set -g @neolazygit_open 'g'

set -g @plugin 'tmux-plugins/tmux-logging'
set -g @logging-path "$HOME/.config/tmux/logs"

# tmux-pane-focus removed — fires resize-pane on every focus change, causes lag

# ============================================================================
# INITIALIZE TPM (KEEP AT BOTTOM)
# ============================================================================
run '~/.tmux/plugins/tpm/tpm'
